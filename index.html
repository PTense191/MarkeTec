<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketec</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e63030;
      --yellow: #f5c518;
      --green: #2dba5e;
      --dark: #1a1a2e;
      --gray-bg: #f5f5f7;
      --white: #ffffff;
      --border: #e0e0e0;
      --text: #222;
      --muted: #888;
      --accent: #ff6b35;
      --shadow: 0 2px 12px rgba(0,0,0,0.09);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

 .logo-icon {
  width: 50px;
  height: 50px;
  object-fit: contain;
}

    /* Tent/awning SVG logo */
    .logo-text {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--red) 0%, var(--yellow) 50%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 0.92rem;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--red); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-outline {
      border: 2px solid var(--dark);
      background: transparent;
      color: var(--dark);
      padding: 7px 18px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-outline:hover { background: var(--dark); color: white; }

    .btn-solid {
      border: 2px solid var(--dark);
      background: var(--dark);
      color: white;
      padding: 7px 18px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-solid:hover { background: #333; }

    /* ── LAYOUT ── */
    .page {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px 60px;
      gap: 24px;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
    }

    .filter-card {
      background: var(--white);
      border-radius: 14px;
      padding: 20px 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .filter-section-title {
      font-weight: 800;
      font-size: 0.88rem;
      color: var(--text);
      margin-bottom: 12px;
      margin-top: 18px;
    }

    .filter-section-title:first-child { margin-top: 0; }

    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gray-bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .keyword-tag .x {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
    }

    .filter-checkbox {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 10px;
    }

    .filter-checkbox label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
    }

    .filter-checkbox input[type="checkbox"] {
      accent-color: var(--dark);
      margin-top: 2px;
      width: 15px;
      height: 15px;
    }

    .filter-label-text { font-weight: 700; font-size: 0.85rem; }
    .filter-desc { font-size: 0.75rem; color: var(--muted); }

    .price-range-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .price-label { font-size: 0.8rem; font-weight: 700; }
    .price-value { font-size: 0.8rem; color: var(--muted); }

    input[type="range"] {
      width: 100%;
      accent-color: var(--dark);
      height: 4px;
    }

    .divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 14px 0 4px;
    }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      min-width: 0;
    }

    /* Search + Sort Bar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 16px;
    }

    .search-wrap {
      position: relative;
      width: 220px;
    }

    .search-input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border 0.2s;
    }

    .search-input:focus { border-color: #aaa; }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
    }

    .sort-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.18s;
      color: var(--text);
    }

    .sort-pill:hover { border-color: #999; }

    .sort-pill.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    /* ── PRODUCT GRID ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.18s, box-shadow 0.18s;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1 / 0.85;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .product-img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 0.85;
      background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #ccc;
    }

    .product-info {
      padding: 14px 16px 16px;
    }

    .product-name {
      font-weight: 800;
      font-size: 0.95rem;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .product-price {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--dark);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--white);
      border-top: 2px solid var(--border);
      padding: 48px 64px 36px;
    }

    .footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 64px;
      align-items: flex-start;
    }

    .footer-brand {
      flex-shrink: 0;
    }

    .footer-logo-text {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--red), var(--yellow), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .social-icons {
      display: flex;
      gap: 14px;
      margin-top: 16px;
    }

    .social-icons a {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 1.1rem;
      transition: color 0.2s;
      text-decoration: none;
    }

    .social-icons a:hover { color: var(--red); }

    .footer-cols {
      display: flex;
      gap: 64px;
      flex: 1;
    }

    .footer-col h4 {
      font-weight: 800;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .footer-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-col ul li a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      transition: color 0.18s;
    }

    .footer-col ul li a:hover { color: var(--text); }

    /* Animated hover on cards */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-card {
      animation: fadeUp 0.4s ease both;
    }

    .product-card:nth-child(1) { animation-delay: 0.05s; }
    .product-card:nth-child(2) { animation-delay: 0.10s; }
    .product-card:nth-child(3) { animation-delay: 0.15s; }
    .product-card:nth-child(4) { animation-delay: 0.20s; }
    .product-card:nth-child(5) { animation-delay: 0.25s; }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav>
  <a href="#" class="logo">
    <img src="marketec logo 1.png" class="logo-icon" alt="Marketec Logo">
    <span class="logo-text">MARKETEC</span>
  </a>

  <ul class="nav-links">
    <li><a href="#">Comprar</a></li>
    <li><a href="#">Categorías</a></li>
    <li><a href="#">Vender</a></li>
    <li><a href="#">Carrito</a></li>
    <li><a href="#">Contáctanos</a></li>
  </ul>

  <div class="nav-actions">
    <button class="btn-outline">Iniciar sesión</button>
    <button class="btn-solid">Regístrate</button>
  </div>
</nav>

<!-- ── PAGE ── -->
<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-card">
      <div class="filter-section-title">Keywords</div>
      <span class="keyword-tag">Comida <span class="x">×</span></span>

      <hr class="divider"/>
      <div class="filter-section-title">Label</div>

      <div class="filter-checkbox">
        <label><input type="checkbox" checked/> <div><div class="filter-label-text">Label</div><div class="filter-desc">Description</div></div></label>
      </div>
      <div class="filter-checkbox">
        <label><input type="checkbox" checked/> <div><div class="filter-label-text">Label</div><div class="filter-desc">Description</div></div></label>
      </div>
      <div class="filter-checkbox">
        <label><input type="checkbox" checked/> <div><div class="filter-label-text">Label</div><div class="filter-desc">Description</div></div></label>
      </div>

      <hr class="divider"/>
      <div class="price-range-wrap">
        <span class="price-label">Label</span>
        <span class="price-value">$0-100</span>
      </div>
      <input type="range" min="0" max="100" value="100"/>

      <hr class="divider"/>
      <div class="filter-section-title">Color</div>
      <div class="filter-checkbox"><label><input type="checkbox" checked/> <div class="filter-label-text">Label</div></label></div>
      <div class="filter-checkbox"><label><input type="checkbox" checked/> <div class="filter-label-text">Label</div></label></div>
      <div class="filter-checkbox"><label><input type="checkbox" checked/> <div class="filter-label-text">Label</div></label></div>

      <hr class="divider"/>
      <div class="filter-section-title">Size</div>
      <div class="filter-checkbox"><label><input type="checkbox" checked/> <div class="filter-label-text">Label</div></label></div>
      <div class="filter-checkbox"><label><input type="checkbox" checked/> <div class="filter-label-text">Label</div></label></div>
      <div class="filter-checkbox"><label><input type="checkbox" checked/> <div class="filter-label-text">Label</div></label></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Buscar"/>
      </div>
      <div class="sort-pills">
        <button class="sort-pill active">✔ Nuevo</button>
        <button class="sort-pill">Mayor Precio</button>
        <button class="sort-pill">Menor Precio</button>
        <button class="sort-pill">Calificación</button>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="product-grid">

      <div class="product-card">
        <div class="product-img-placeholder">🥗</div>
        <div class="product-info">
          <div class="product-name">Chi la quería</div>
          <div class="product-price">$120</div>
        </div>
      </div>

      <div class="product-card">
        <div class="product-img-placeholder">🌭</div>
        <div class="product-info">
          <div class="product-name">Jochos Tec</div>
          <div class="product-price">$60</div>
        </div>
      </div>

      <div class="product-card">
        <div class="product-img-placeholder">🫔</div>
        <div class="product-info">
          <div class="product-name">El chilaquil</div>
          <div class="product-price">$120</div>
        </div>
      </div>

      <div class="product-card">
        <div class="product-img-placeholder">🫓</div>
        <div class="product-info">
          <div class="product-name">Ricas Gorditas</div>
          <div class="product-price">$60</div>
        </div>
      </div>

      <div class="product-card">
        <div class="product-img-placeholder">🍲</div>
        <div class="product-info">
          <div class="product-name">Caldo 7 mares</div>
          <div class="product-price">$35</div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ── FOOTER ── -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="marketec logo 1.png" style="width:120px; object-fit:contain;" alt="Marketec Logo">
      <div class="social-icons">
        <a href="#">✖</a>
        <a href="#">📷</a>
        <a href="#">▶</a>
        <a href="#">💼</a>
      </div>
    </div>

    <div class="footer-cols">
      <div class="footer-col">
    
      </div>
      <div class="footer-col">
      
      </div>
      <div class="footer-col">
    
      </div>
    </div>
  </div>
</footer>

<script>
  // Sort pill toggle
  document.querySelectorAll('.sort-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.sort-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });
  });

  // Keyword tag remove
  document.querySelectorAll('.keyword-tag').forEach(tag => {
    tag.querySelector('.x').addEventListener('click', () => tag.remove());
  });
</script>

</body>
</html>
