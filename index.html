<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkeTec - Emprendimiento ITT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MarkeTec 🐾</div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Mis Ventas</a>
            <a href="#">Perfil</a>
        </nav>
    </header>

    <main>
        <h1>Mercado para Galgos Emprendedores</h1>
        
        <section class="contenedor-productos">
            <article class="tarjeta">
                <img src="assets/imagenes/chilaquiles-verdes.jpg" alt="Chilaquiles verdes con pollo">
                <div class="info">
                    <h3>Chilaquiles del Chef</h3>
                    <p class="precio">$60 MXN</p>
                    <p class="vendedor">Vendido por: Luis (Sistemas)</p>
                    <button>Contactar</button>
                </div>
            </article>

            <article class="tarjeta">
                <img src="assets/imagenes/impresion-3d.jpg" alt="Impresión 3D de un Galgo">
                <div class="info">
                    <h3>Impresiones 3D</h3>
                    <p class="precio">$120 MXN</p>
                    <p class="vendedor">Vendido por: Ana (Industrial)</p>
                    <button>Contactar</button>
                </div>
            </article>
        </section>
    </main>

</body>

</html>
